name: Build - Staging

on:
  push:
    branches: [staging]
  pull_request:
    branches: [staging]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build all images
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_REPLICATION_USER: ci
          POSTGRES_REPLICATION_PASSWORD: ci
          JWT_SECRET: ci
        run: docker compose -f docker-compose.yml build

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    environment: staging
    concurrency:
      group: staging-deploy
      cancel-in-progress: false
    steps:
      - name: Configure SSH
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/edunova_deploy_key
          chmod 600 ~/.ssh/edunova_deploy_key
          ssh-keyscan -p "${VPS_PORT:-22}" "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy staging on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/edunova_deploy_key -p "${VPS_PORT:-22}" "$VPS_USER@$VPS_HOST" \
            "APP_DIR='$VPS_APP_DIR' DOPPLER_TOKEN='$DOPPLER_TOKEN' bash -s" <<'EOF'
          set -euo pipefail

          if [ ! -d "$APP_DIR/.git" ]; then
            git clone --recurse-submodules https://github.com/EduNova2026/SuperRepository.git "$APP_DIR"
          fi

          cd "$APP_DIR"
          git fetch origin staging
          git checkout staging
          git reset --hard origin/staging
          git submodule sync --recursive
          git submodule update --init --recursive

          DOPPLER_TOKEN="$DOPPLER_TOKEN" doppler run -- docker compose -f docker-compose.yml up -d --build --remove-orphans
          docker compose -f docker-compose.yml ps
          EOF
